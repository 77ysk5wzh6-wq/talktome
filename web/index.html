        const arRaw = aWord._finalRect, brRaw = bWord._finalRect;
        const aIns = (arRaw.height * SHRINK) / 2;
        const bIns = (brRaw.height * SHRINK) / 2;
        const ar = { left: arRaw.left, right: arRaw.right,
                     top: arRaw.top + aIns, bottom: arRaw.bottom - aIns,
                     width: arRaw.width, height: arRaw.height - aIns * 2 };
        const br = { left: brRaw.left, right: brRaw.right,
                     top: brRaw.top + bIns, bottom: brRaw.bottom - bIns,
                     width: brRaw.width, height: brRaw.height - bIns * 2 };
        const prevSide = semanticWires.get(pk)?.lastSide ?? null;
        const eq = nearestEdgeQuad(ar, br, SEM_PAD, prevSide);
        if (!eq) continue;
        const { quad, aSide, bSide, side } = eq;
        const dStr = "M " + quad.map(p => `${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" L ") + " Z";
        // Gradient endpoints sit exactly on each box's edge midpoint, so
        // stop 0 alpha == a-box solid fill and stop end alpha == b-box solid
        // fill. No seam between box and band.
        const ax = (aSide[0].x + aSide[1].x) / 2;
        const ay = (aSide[0].y + aSide[1].y) / 2;
        const bx = (bSide[0].x + bSide[1].x) / 2;
        const by = (bSide[0].y + bSide[1].y) / 2;
        semAlive.set(pk, {
          d: dStr,
          opA: aWord._fillOp ?? 0.5,
          opB: bWord._fillOp ?? 0.5,
          ax, ay, bx, by,
          aWord, bWord,
          sim: typeof s.sim === "number" ? s.sim : null,
          side,
        });
        if (!semWordRoles.has(aWord)) semWordRoles.set(aWord, { role: "A", pk });
        if (!semWordRoles.has(bWord)) semWordRoles.set(bWord, { role: "B", pk });
      }
    }
    // Box fills are deferred to phase 7d so they can read the wipe head
    // each pair's animation has reached this frame.

    // 7b. Reconcile semanticWires map with alive set: create new, update
    // existing, mark dead ones for exit.
    for (const [pk, info] of semAlive) {
      let rec = semanticWires.get(pk);
      if (!rec) {
        // Gradient with FOUR stops:
        //   stop0: a-end colour (starts at offset 0)
        //   stop1: a-end colour at the wipe head (zero alpha just past head)
        //   stop2: b-end colour at the same offset (zero alpha)
        //   stop3: b-end colour at offset 1
        // During enter we slide stop1/stop2 from 0 -> 1 so the band wipes
        // from a's side toward b's side. Exit slides 1 -> 0 so the band
        // recedes back to a.
        const id = `semGrad${gradSeq++}`;
        const g = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
        g.setAttribute("id", id);
        g.setAttribute("gradientUnits", "userSpaceOnUse");
        const stops = [];
        for (let i = 0; i < 4; i++) {
          const s = document.createElementNS("http://www.w3.org/2000/svg", "stop");
          s.setAttribute("stop-color", "#ff5e00");
          s.setAttribute("stop-opacity", "0");
          g.appendChild(s);
          stops.push(s);
        }
        defsBg.appendChild(g);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "semantic");
        path.setAttribute("d", info.d);
        path.style.fill = `url(#${id})`;
        // Render in the background layer so the band sits *behind* caption
        // text, like the boxes. Append before any boxes so boxes draw on top
        // of the band where they overlap (band -> box -> text reads cleanly).
        svgBg.insertBefore(path, svgBg.firstChild);
        // Stagger enter starts so a freshly-focused screen doesn't fire
        // dozens of wipes on the same frame -- each pair starts up to
        // 1.5s after this tick.
        const stagger = (semanticWires.size % 16) * 100;
        // Cosine-similarity label, drawn on the bg SVG so it sits in the
        // same layer as the band but above it (text appended last).
        let simEl = null;
        if (typeof info.sim === "number") {
          simEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
          simEl.setAttribute("class", "sem-sim");
          simEl.textContent = "cos sim " + info.sim.toFixed(2);
          svgBg.appendChild(simEl);
        }
        rec = {
          path, grad: { el: g, id, stops },
          phase: "enter", phaseStartedAt: now + stagger,
          d: info.d, dirSig: "", sim: info.sim ?? null,
          simEl, simSig: "",
        };
        semanticWires.set(pk, rec);
      } else {
        if (rec.phase === "exit") {
          rec.phase = "enter";
          rec.phaseStartedAt = now;
        }
        if (rec.d !== info.d) {
          rec.path.setAttribute("d", info.d);
          rec.d = info.d;
        }
      }
      // Remember which side was picked this frame so the next call to
      // nearestEdgeQuad can apply hysteresis and avoid side-hopping.
      rec.lastSide = info.side;
      // Update gradient direction whenever endpoints move.
      const dirSig = `${info.ax.toFixed(0)}|${info.ay.toFixed(0)}|${info.bx.toFixed(0)}|${info.by.toFixed(0)}`;
      if (rec.dirSig !== dirSig) {
        rec.grad.el.setAttribute("x1", info.ax.toFixed(1));
        rec.grad.el.setAttribute("y1", info.ay.toFixed(1));
        rec.grad.el.setAttribute("x2", info.bx.toFixed(1));
        rec.grad.el.setAttribute("y2", info.by.toFixed(1));
        rec.dirSig = dirSig;
      }
      // Sim label rides the band's midpoint, rotated to follow direction.
      if (rec.simEl) {
        const mx = (info.ax + info.bx) / 2;
        const my = (info.ay + info.by) / 2;
        let deg = Math.atan2(info.by - info.ay, info.bx - info.ax) * 180 / Math.PI;
        // Keep text upright: if it would read upside-down, flip 180 so it
        // still follows the band axis but stays right-side up.
        if (deg > 90) deg -= 180;
        else if (deg < -90) deg += 180;
        const sig = `${mx.toFixed(0)}|${my.toFixed(0)}|${deg.toFixed(0)}`;
        if (rec.simSig !== sig) {
          rec.simEl.setAttribute("x", mx.toFixed(1));
          rec.simEl.setAttribute("y", my.toFixed(1));
          rec.simEl.setAttribute("transform", `rotate(${deg.toFixed(1)} ${mx.toFixed(1)} ${my.toFixed(1)})`);
          rec.simSig = sig;
        }
      }
      rec.opA = semStopOpacity(info.opA);
      rec.opB = semStopOpacity(info.opB);
    }
    for (const [pk, rec] of semanticWires) {
      if (!semAlive.has(pk) && rec.phase !== "exit") {
        rec.phase = "exit";
        rec.phaseStartedAt = now;
      }
    }

    // 7c. Wipe enter/exit by sliding the gradient cutoff. `head` goes
    // from 0 (only a-side visible) to 1 (whole band visible) on enter,
    // and reverses on exit.
    for (const [pk, rec] of semanticWires) {
      let head;
      if (rec.phase === "enter") {
        const t = Math.min(1, (now - rec.phaseStartedAt) / WIRE_ENTER_MS);
        head = easeOutCubic(t);
        if (t >= 1) { rec.phase = "live"; head = 1; }
      } else if (rec.phase === "exit") {
        const t = Math.min(1, (now - rec.phaseStartedAt) / WIRE_EXIT_MS);
        head = 1 - easeInCubic(t);
        if (t >= 1) {
          rec.path.remove();
          if (rec.simEl) rec.simEl.remove();
          if (rec.grad) rec.grad.el.remove();
          semanticWires.delete(pk);
          continue;
        }
      } else {
        head = 1;
      }
      // Sim label fades in with the band reveal; vanishes during exit.
      if (rec.simEl) {
        const a = (head * head).toFixed(3);
        if (rec.simAlphaSig !== a) {
          rec.simEl.setAttribute("fill-opacity", a);
          rec.simAlphaSig = a;
        }
      }

      const opA = rec.opA ?? 0.5;
      const opB = rec.opB ?? 0.5;
      const eps = 0.04;
      const h0 = Math.max(0, head - eps);
      const h1 = Math.min(1, head + eps);
      const reveal = Math.max(0, Math.min(1, (head - 0.75) / 0.25));
      const tailAlpha = opB * reveal;
      // Skip DOM writes when the live phase has settled: stops never move
      // anymore, but a naive RAF would still call setAttribute every tick
      // and force the SVG renderer to repaint the gradient. Cache the last
      // head we wrote and bail when it hasn't budged.
      if (rec.lastHead !== head || rec.lastTail !== tailAlpha) {
        const stops = rec.grad.stops;
        stops[0].setAttribute("offset", "0");
        stops[0].setAttribute("stop-opacity", opA.toFixed(2));
        stops[1].setAttribute("offset", h0.toFixed(3));
        stops[1].setAttribute("stop-opacity", opA.toFixed(2));
        stops[2].setAttribute("offset", h1.toFixed(3));
        stops[2].setAttribute("stop-opacity", tailAlpha.toFixed(2));
        stops[3].setAttribute("offset", "1");
        stops[3].setAttribute("stop-opacity", tailAlpha.toFixed(2));
        rec.lastHead = head;
        rec.lastTail = tailAlpha;
      }
      rec.head = head;
      rec.tailAlpha = tailAlpha;
    }

    // 7d. Draw filled boxes around each word participating in a pair.
    //     Each box is a SOLID fill whose opacity equals the gradient's
    //     stop value at that endpoint. Since the band's gradient stops
    //     reach `opA` at the a-word and `tailAlpha` at the b-word, the
    //     box and band touch at exactly the same colour value -> seamless.
    for (const [w, info] of semWordRoles) {
      const r = w._finalRect;
      if (!r) continue;
      const rec = semanticWires.get(info.pk);
      if (!rec) continue;
      const SHRINK = 0.10;
      const insetY = (r.height * SHRINK) / 2;
      const op = info.role === "A"
        ? (rec.opA ?? 0.5)
        : (rec.tailAlpha ?? 0);
      const box = getSemanticBox();
      box.setAttribute("x", (r.left - SEM_PAD).toFixed(1));
      box.setAttribute("y", (r.top + insetY - SEM_PAD).toFixed(1));
      box.setAttribute("width",  (r.width + SEM_PAD * 2).toFixed(1));
      box.setAttribute("height", (r.height - insetY * 2 + SEM_PAD * 2).toFixed(1));
      const fo = Math.max(0, Math.min(1, op)).toFixed(2);
      // Avoid re-setting fill / fill-opacity if they're already correct;
      // pool boxes get reused frame to frame.
      if (box._lastFo !== fo) {
        box.style.fill = "#ff5e00";
        box.setAttribute("fill-opacity", fo);
        box._lastFo = fo;
      }
    }

    hideExtras();
    // Refresh Korean gloss labels each tick: words come and go with the
    // captions, so the labels need to follow them. Cheap: it's a no-op
    // when no focus category is set.
    if (typeof refreshGlossLabels === "function") refreshGlossLabels();
  }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t)  { return t * t * t; }

  // Throttle: run tick at most every TICK_INTERVAL_MS (~30fps).
  const TICK_INTERVAL_MS = 33;
  let lastTickAt = 0;
  function safeTick(now) {
    const t = now || performance.now();
    if (t - lastTickAt >= TICK_INTERVAL_MS) {
      lastTickAt = t;
      try { tick(t); }
      catch (e) { console.error("wire tick error", e); }
    }
    requestAnimationFrame(safeTick);
  }
  requestAnimationFrame(safeTick);

  // Expose synchronous helpers for the static poster renderer: it can't
  // rely on RAF (headless Chromium throttles it under load) so it advances
  // the wire/semantic state by calling tick() directly with a faked clock.
  window.__forceWireTick = (fakeNow) => {
    try { tick(fakeNow); } catch (e) { console.error(e); }
  };
  window.__settleWires = (steps = 60) => {
    // Run plenty of ticks with a fake clock advancing fast enough to clear
    // every enter/stagger window (max stagger ~2400ms + WIRE_ENTER_MS).
    const stride = 80;
    let t = performance.now();
    for (let i = 0; i < steps; i++) {
      window.__forceWireTick(t);
      t += stride;
    }
  };
}

// Background poem: simple on/off toggle. The full quatrain sits in six
// fixed lines, each justified edge-to-edge across the viewport. JS only
// handles font-size sizing; the button just shows/hides the layer.
const BG_POEM_LINES = [
  "Ah Love! could thou and I with",
  "Fate conspire To grasp this",
  "sorry Scheme of Things entire,",
  "Would not we shatter it to",
  "bits - and then Re-mould it",
  "nearer to the Heart's Desire!",
];

let poemBgController = null;

function startPoemBackground() {
  if (poemBgController) return;
  const root = document.getElementById("poem-bg");
  if (!root) return;
  root.style.display = "flex";
  const block = document.createElement("div");
  block.className = "poem";

  for (const line of BG_POEM_LINES) {
    const lineEl = document.createElement("div");
    lineEl.className = "pl";
    const tokens = line.split(/(\s+)/);
    for (const tok of tokens) {
      if (/^\s+$/.test(tok)) {
        lineEl.appendChild(document.createTextNode(tok));
      } else if (tok.length) {
        const span = document.createElement("span");
        span.className = "pw";
        span.textContent = tok;
        lineEl.appendChild(span);
      }
    }
    block.appendChild(lineEl);
  }
  root.appendChild(block);

  // Binary-search the biggest font-size whose six-line block fits the
  // viewport in both dimensions, then scaleY the block so any leftover
  // vertical space is consumed by stretching the glyphs taller. The
  // horizontal axis stays at natural width so justify still spreads the
  // words edge-to-edge.
  function fit() {
    block.style.transform = "";
    // Width comes from .poem's CSS rule (calc(100% - 60px)), so the
    // poem block has its own breathing room from the viewport edge.
    const maxW = root.clientWidth;
    const maxH = root.clientHeight;
    const lines = Array.from(block.querySelectorAll(".pl"));
    function fits(fs) {
      block.style.fontSize = fs + "px";
      // Every .pl must stay a single row (height ≈ fs * line-height).
      const lineH = fs * 0.78 * 1.4;   // generous threshold above one row
      for (const ln of lines) {
        if (ln.offsetHeight > lineH) return false;
      }
      return block.offsetHeight <= maxH && block.scrollWidth <= maxW;
    }
    let lo = 20, hi = 800, best = 20;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (fits(mid)) { best = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    block.style.fontSize = best + "px";
    const naturalH = block.offsetHeight;
    const scaleY = naturalH > 0 ? maxH / naturalH : 1;
    block.style.transform = `scaleY(${scaleY.toFixed(4)})`;
  }
  fit();
  // Bebas Neue may not be loaded yet on first paint -- re-fit once it is,
  // otherwise the search measures the fallback (Impact) and the chosen
  // size won't match the eventual rendered face.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fit);
  }
  window.addEventListener("resize", fit);

  poemBgController = {
    stop() {
      window.removeEventListener("resize", fit);
      block.remove();
      root.style.display = "none";
      poemBgController = null;
    },
  };
}

function stopPoemBackground() {
  if (poemBgController) poemBgController.stop();
}

// Mouse-driven parallax: smooth pointer position into rotateX/Y angles
// applied to every caption via CSS variables on #stage. The wires layer
// stays flat so captions appear to float above the wire grid.
function startStats() {
  const el = document.getElementById("stats");
  let frames = 0;
  let last = performance.now();
  let lastReport = last;
  function frame() {
    frames++;
    const now = performance.now();
    if (now - lastReport >= 500) {
      const fps = (frames * 1000) / (now - lastReport);
      const captions = document.getElementsByClassName("caption").length;
      const allNodes = document.getElementsByTagName("*").length;
      const jobs = (typeof charJobs !== "undefined") ? charJobs.length : 0;
      const active = activeClipFiles.size;
      const mem = (performance.memory && performance.memory.usedJSHeapSize)
        ? (performance.memory.usedJSHeapSize / 1048576).toFixed(1) + "MB"
        : "n/a";
      el.textContent = `fps ${fps.toFixed(0)}  caps ${captions}  nodes ${allNodes}  jobs ${jobs}  active ${active}  heap ${mem}`;
      frames = 0;
      lastReport = now;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}


// ===== Static poster renderer =====
// Lays down a single frozen frame: N captions placed across the viewport,
// every glyph already settled, wires/boxes drawn once, the sim band kept
// to a target count. No audio, no animations, no poem layer. The page
// signals readiness via window.__STATIC_READY for a headless capture.
async function renderStaticPoster({ captions, semantic }) {
  window.__staticMode = true;
  document.getElementById("start").style.display = "none";
  document.getElementById("stats")?.remove();
  document.getElementById("legend")?.remove();
  // Keep #poem-bg in the DOM so the headless capture can flip it on for
  // an extra "poem layer" pass after grabbing captions/wires.
  // Drop the body's white background so omitBackground in the headless
  // screenshot actually produces a transparent capture -- the static
  // pipeline composites a white floor itself, layered behind the
  // semantic bg PNG.
  document.documentElement.style.background = "transparent";
  document.body.style.background = "transparent";
  document.body.style.backgroundColor = "transparent";

  // Disable the slide-in transition so .ch.on glyphs sit at their final
  // positions immediately. Without this, the static capture catches them
  // mid-flight (translateX 20vw -> 0 over --slide-ms) and they read as
  // empty captions.
  const staticStyle = document.createElement("style");
  staticStyle.textContent = `
    .caption .ch, .caption .ch.on, .caption .ch.off-left {
      transition: none !important;
      transform: none !important;
      opacity: 1 !important;
    }
    .caption { transition: none !important; }
  `;
  document.head.appendChild(staticStyle);

  // Reproduce the live track-mix proportions so caption sizes/languages
  // match what the screen normally shows. Each entry's weight is the same
  // as how often that track plays in the live scene.
  const STATIC_TRACK_WEIGHTS = TRACK_LAYERS.map(layer => 1);
  const totalW = STATIC_TRACK_WEIGHTS.reduce((s, x) => s + x, 0);

  function pickLayer() {
    let r = Math.random() * totalW;
    for (let i = 0; i < TRACK_LAYERS.length; i++) {
      r -= STATIC_TRACK_WEIGHTS[i];
      if (r <= 0) return TRACK_LAYERS[i];
    }
    return TRACK_LAYERS[TRACK_LAYERS.length - 1];
  }

  // 1. Build all captions and place them with a FAST cached-rect placer
  //    (the live placeCaption() reads getBoundingClientRect() on every
  //    existing caption, which forces a full layout per insert -- O(N^2)
  //    layouts at N=2000 is multi-minute pain).
  const stage = document.getElementById("stage");
  const W = window.innerWidth, H = window.innerHeight;
  const SM = 16;            // matches SAFE_MARGIN_PX
  const CW = 64, CH = 32;   // matches GRID_CELL_W / GRID_CELL_H
  const placedRects = [];   // {left, top, right, bottom}
  function rectsHit(x, y, w, h, pad) {
    for (const r of placedRects) {
      if (x < r.right + pad && x + w > r.left - pad &&
          y < r.bottom + pad && y + h > r.top - pad) return true;
    }
    return false;
  }
  let captionSeqLocal = 0;
  const built = [];
  for (let i = 0; i < captions; i++) {
    const layer = pickLayer();
    let clip;
    try { clip = pickRandomUnique(layer.tier, layer.lang); }
    catch (e) { continue; }
    const cap = makeCaptionEl(clip, layer.captionClass);
    cap.style.left = "-9999px"; cap.style.top = "-9999px";
    stage.appendChild(cap);
    cap.dataset.cap = String(captionSeq++);
    const w = cap.offsetWidth;
    const h = cap.offsetHeight;
    if (!w || !h) continue;
    const maxX = Math.max(SM, W - w - SM);
    const maxY = Math.max(SM, H - h - SM);
    const cellsX = Math.max(1, Math.floor((maxX - SM) / CW) + 1);
    const cellsY = Math.max(1, Math.floor((maxY - SM) / CH) + 1);
    let x = -1, y = -1;
    const isHuge = cap.classList.contains("huge");
    const TRIES = 40;
    for (let t = 0; t < TRIES; t++) {
      const tx = SM + Math.floor(Math.random() * cellsX) * CW;
      const ty = SM + Math.floor(Math.random() * cellsY) * CH;
      if (tx > maxX || ty > maxY) continue;
      if (rectsHit(tx, ty, w, h, isHuge ? 80 : 4)) continue;
      x = tx; y = ty; break;
    }
    if (x < 0) {
      // Try without the huge-gap constraint.
      for (let t = 0; t < TRIES; t++) {
        const tx = SM + Math.floor(Math.random() * cellsX) * CW;
        const ty = SM + Math.floor(Math.random() * cellsY) * CH;
        if (tx > maxX || ty > maxY) continue;
        if (rectsHit(tx, ty, w, h, 4)) continue;
        x = tx; y = ty; break;
      }
    }
    if (x < 0) {
      // Total fallback: skip rather than overlap.
      cap.remove();
      continue;
    }
    cap.style.left = `${x}px`;
    cap.style.top  = `${y}px`;
    placedRects.push({ left: x, top: y, right: x + w, bottom: y + h });
    for (const ch of cap.querySelectorAll(".ch")) ch.classList.add("on");
    built.push(cap);
  }
  console.log(`[static] placed ${built.length}/${captions} captions`);

  // 2. Wait one frame so the browser settles glyph metrics, then run the
  //    wire loop's tick once to lay down boxes/wires/semantic bands.
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  startWireLoop();
  // Headless Chromium throttles RAF under heavy DOM (~2000 captions),
  // so we drive the wire tick synchronously with a faked clock instead.
  trimSemanticBands(semantic);
  if (typeof window.__settleWires === "function") {
    window.__settleWires(80);   // ~6.4s of simulated time
  }
  // One more frame so the browser flushes paints before capture.
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  // Bake every visual property the wire stylesheet relies on directly
  // onto each SVG node as attributes. resvg only sees what's inside the
  // SVG document -- it doesn't read <style> rules that target nodes by
  // class, so stroke / fill / stroke-width / dash patterns all have to
  // live on the elements themselves before we serialise.
  const PALETTE = {
    entity:   "#ff00ff",
    action:   "#00e5ff",
    quality:  "#4cd44c",
    relation: "#8a8a8a",
  };
  // Foreground wires: paths.
  for (const [cls, hex] of Object.entries(PALETTE)) {
    document.querySelectorAll(`#wires path.${cls}`).forEach(p => {
      // Each wire path has its stroke set inline as `url("#wgradN")` so
      // it picks up the per-pair gradient. Browsers serialise that style
      // with HTML-escaped quotes (&quot;), which resvg can't parse, so we
      // rewrite stroke as a bare `url(#wgradN)` attribute and clear the
      // inline style. If no gradient was assigned (shouldn't happen), we
      // fall back to the category palette colour.
      const m = (p.style.stroke || "").match(/url\(\s*['"]?#([^'"\s)]+)['"]?\s*\)/);
      if (m) {
        p.setAttribute("stroke", `url(#${m[1]})`);
      } else {
        p.setAttribute("stroke", hex);
      }
      p.style.stroke = "";   // drop the escaped inline so it can't override
      p.setAttribute("fill", "none");
      p.setAttribute("stroke-width", "0.6");
      p.setAttribute("stroke-opacity", "0.85");
      // Clear the JS-driven dash trick used for enter/exit animation;
      // poster output should show every wire fully.
      p.style.strokeDasharray = "";
      p.style.strokeDashoffset = "";
      if (cls === "relation") p.setAttribute("stroke-dasharray", "4 4");
      if (cls === "action")   { p.setAttribute("stroke-linejoin", "round"); p.setAttribute("stroke-linecap", "round"); }
      if (cls === "quality")  p.setAttribute("stroke-linecap", "round");
    });
    // Boxes (rect / ellipse).
    document.querySelectorAll(`#wires rect.${cls}-box`).forEach(b => {
      b.setAttribute("stroke", hex);
      b.setAttribute("fill", hex);
      b.setAttribute("stroke-width", "0.6");
      b.setAttribute("stroke-opacity", "0.85");
      if (cls === "relation") b.setAttribute("stroke-dasharray", "4 3");
    });
    document.querySelectorAll(`#wires ellipse.${cls}-box`).forEach(b => {
      b.setAttribute("stroke", hex);
      b.setAttribute("fill", hex);
      b.setAttribute("stroke-width", "0.6");
      b.setAttribute("stroke-opacity", "0.85");
    });
    // Ports (circles).
    document.querySelectorAll(`#wires circle.${cls}-port`).forEach(c => {
      c.setAttribute("stroke", hex);
      c.setAttribute("fill", hex);
      c.setAttribute("stroke-width", "0.4");
      c.setAttribute("stroke-opacity", "0.85");
    });
  }
  // Semantic bg layer: filled bands + boxes. Each band's fill is also a
  // gradient url(#semGradN); apply the same un-escaping fix as above.
  function unescapeUrlFill(node, fallback) {
    const m = (node.style.fill || "").match(/url\(\s*['"]?#([^'"\s)]+)['"]?\s*\)/);
    if (m) node.setAttribute("fill", `url(#${m[1]})`);
    else node.setAttribute("fill", fallback);
    node.style.fill = "";
  }
  document.querySelectorAll("#wires-bg path.semantic").forEach(p => {
    unescapeUrlFill(p, "#ff5e00");
    p.setAttribute("stroke", "none");
  });
  document.querySelectorAll("#wires-bg rect.semantic-box").forEach(b => {
    unescapeUrlFill(b, "#ff5e00");
    b.setAttribute("stroke", "none");
  });

  const wiresFg = document.getElementById("wires");
  const wiresBg = document.getElementById("wires-bg");
  wiresFg.setAttribute("width", window.innerWidth);
  wiresFg.setAttribute("height", window.innerHeight);
  wiresBg.setAttribute("width", window.innerWidth);
  wiresBg.setAttribute("height", window.innerHeight);
  // Add an XML namespace on serialise so resvg accepts the markup.
  wiresFg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  wiresBg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  window.__svgWiresFg = wiresFg.outerHTML;
  window.__svgWiresBg = wiresBg.outerHTML;

  // Headless helper: hide everything but the poem layer, then turn it on.
  // Used by the renderer to grab the poem as its own PNG for difference
  // blending in the final composite.
  window.__showPoemOnly = async () => {
    document.getElementById("stage").style.display = "none";
    document.getElementById("wires").style.display = "none";
    document.getElementById("wires-bg").style.display = "none";
    // Disable the live mix-blend-mode for the standalone capture; sharp
    // will apply `difference` itself when compositing this PNG over the
    // base image. The poem keeps its WHITE colour so the difference math
    // works out the same as on the live page:
    //   white floor (255) - white glyph (255) = 0  -> reads as black
    //   coloured wire (255,0,255) - white glyph    = (0,255,0) etc.
    const poemRoot = document.getElementById("poem-bg");
    poemRoot.style.mixBlendMode = "normal";
    if (typeof startPoemBackground === "function") startPoemBackground();
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  };

  window.__STATIC_READY = true;
}

// Cull semantic bands until at most `target` remain alive. We just delete
// `_similar` from words on excess pairs so the next tick stops including
// them in semAlive, and they fade out.
function trimSemanticBands(target) {
  const stage = document.getElementById("stage");
  const words = stage.querySelectorAll(".word");
  // Build pairs that are currently mutual + visible.
  const seen = new Set();
  const pairs = [];
  const wordByKey = new Map();
  for (const w of words) {
    if (!w._clipFile || w._tokenIdx == null) continue;
    wordByKey.set(`${w._clipFile}|${w._tokenIdx}`, w);
  }
  for (const [k, w] of wordByKey) {
    if (!w._similar) continue;
    for (const s of w._similar) {
      const sk = `${s.file}|${s.ti}`;
      if (!wordByKey.has(sk)) continue;
      const pk = k < sk ? `${k}::${sk}` : `${sk}::${k}`;
      if (seen.has(pk)) continue;
      seen.add(pk);
      pairs.push([w, wordByKey.get(sk), s]);
    }
  }
  // Shuffle, keep the first `target`, strip _similar from the rest.
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  const keep = new Set();
  for (let i = 0; i < Math.min(target, pairs.length); i++) {
    keep.add(pairs[i]);
  }
  // For words involved only in dropped pairs, clear _similar entirely.
  for (let i = target; i < pairs.length; i++) {
    const [a, b] = pairs[i];
    a._similar = (a._similar || []).filter(s => {
      for (const kept of keep) {
        if ((kept[0] === a && kept[2] === s) ||
            (kept[1] === a && wordByKey.get(`${s.file}|${s.ti}`) === kept[0])) return true;
      }
      return false;
    });
    b._similar = (b._similar || []).filter(s => {
      for (const kept of keep) {
        if ((kept[0] === b && kept[2] === s) ||
            (kept[1] === b && wordByKey.get(`${s.file}|${s.ti}`) === kept[0])) return true;
      }
      return false;
    });
  }
}

function freezeAllWires() {
  // Hard-stop all RAF-driven scheduling.
  window.frozen = true;
}

async function main() {
  const res = await fetch("clips.json");
  clips = await res.json();
  buildTierPools();
  console.log("loaded", clips.length, "clips");

  // Static-render mode for poster export. Activated by URL params:
  //   ?static=1&captions=120&semantic=30
  // Renders one frozen frame (no animations, no audio), then sets
  // window.__STATIC_READY = true so a headless capture can grab it.
  const params = new URLSearchParams(window.location.search);
  if (params.get("static") === "1") {
    await renderStaticPoster({
      captions: parseInt(params.get("captions") || "120", 10),
      semantic: parseInt(params.get("semantic") || "30", 10),
    });
    return;
  }

  document.getElementById("startBtn").addEventListener("click", () => {
    document.getElementById("start").style.display = "none";
    startStats();
    startPianoAmbient();
    startWireLoop();
    TRACK_LAYERS.forEach((layer, i) => {
      const t = new Track(layer);
      setTimeout(() => t.start(), i * TRACK_START_STAGGER_MS);
    });
  });

  // Legend buttons toggle category isolation. The freeze button is handled
  // separately below.
  document.querySelectorAll("#legend button.row[data-cat]").forEach(btn => {
    btn.addEventListener("click", () => {
      const cat = btn.dataset.cat;
      const cur = document.body.dataset.focusCat;
      document.querySelectorAll("#legend button.row[data-cat]").forEach(b => b.classList.remove("active"));
      if (cur === cat) {
        delete document.body.dataset.focusCat;
      } else {
        document.body.dataset.focusCat = cat;
        btn.classList.add("active");
      }
      document.body.classList.remove("focus-flash");
      void document.body.offsetWidth;
      document.body.classList.add("focus-flash");
      refreshGlossLabels();
    });
  });

  // Freeze toggle: hard pause/resume. Audio stops, every animation holds
  // in place. Piano ambient keeps playing.
  const freezeBtn = document.getElementById("freezeBtn");
  freezeBtn.addEventListener("click", () => {
    frozen = !frozen;
    freezeBtn.classList.toggle("active", frozen);
    for (const a of liveAudios) {
      try { frozen ? a.pause() : a.play(); } catch (e) {}
    }
    refreshGlossLabels();
  });

  // Poem toggle: starts off; click to show, click again to hide.
  const poemBtn = document.getElementById("poemBtn");
  poemBtn.addEventListener("click", () => {
    if (poemBgController) {
      stopPoemBackground();
      poemBtn.classList.remove("active");
    } else {
      startPoemBackground();
      poemBtn.classList.add("active");
    }
  });
}

// Korean gloss boxes next to non-Korean tagged words. Active whenever a
// category focus is set (freeze is no longer required). Labels follow the
// caption lifecycle -- they fade in when the word arrives in the focused
// category, fade out when the word leaves or the focus changes.
const glossByWord = new WeakMap();   // word DOM -> label DOM
const glossActive = new Set();        // currently visible label DOM elements
function refreshGlossLabels() {
  const focusCat = document.body.dataset.focusCat;

  if (!focusCat) {
    // Tear all labels down with an exit animation.
    for (const label of glossActive) {
      const word = label._word;
      if (word) glossByWord.delete(word);
      label._word = null;
      label.classList.remove("in");
      label.classList.add("out");
      const t = setTimeout(() => label.remove(), 320);
      label._removeTimer = t;
    }
    glossActive.clear();
    return;
  }

  const stage = document.getElementById("stage");
  const words = document.getElementsByClassName("word");

  // Mutual partners for SEMANTIC mode.
  const visibleByKey = new Map();
  if (focusCat === "SEMANTIC") {
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      if (!w._clipFile || w._tokenIdx == null) continue;
      if (!w._finalRect) continue;
      if (w.querySelector(".ch.off-left")) continue;
      if (!w.querySelector(".ch.on")) continue;
      visibleByKey.set(`${w._clipFile}|${w._tokenIdx}`, w);
    }
  }
  function hasVisiblePartner(w) {
    if (!w._similar) return false;
    for (const s of w._similar) {
      if (s.file === w._clipFile) continue;
      if (visibleByKey.has(`${s.file}|${s.ti}`)) return true;
    }
    return false;
  }

  // Decide which words should have a label this frame.
  const wanted = [];
  for (let i = 0; i < words.length; i++) {
    const w = words[i];
    const cat = w.dataset.cat;
    if (!cat) continue;
    if (focusCat === "SEMANTIC") {
      if (!hasVisiblePartner(w)) continue;
    } else {
      if (cat !== focusCat) continue;
    }
    if (!w._ko) continue;
    if (!w._finalRect) continue;
    if (w.querySelector(".ch.off-left")) continue;
    if (!w.querySelector(".ch.on")) continue;
    wanted.push(w);
  }
  const wantedSet = new Set(wanted);

  // Mark labels whose word is no longer wanted for exit.
  for (const label of [...glossActive]) {
    const word = label._word;
    if (!word || !wantedSet.has(word)) {
      if (word) glossByWord.delete(word);
      label._word = null;
      label.classList.remove("in");
      label.classList.add("out");
      glossActive.delete(label);
      if (label._removeTimer) clearTimeout(label._removeTimer);
      label._removeTimer = setTimeout(() => label.remove(), 320);
    }
  }

  // Layout helper: avoid overlaps with already-placed labels (active +
  // newly placed this frame).
  const LABEL_H = 16;
  const LABEL_GAP = 2;
  const placed = [];
  for (const label of glossActive) {
    const left = parseFloat(label.style.left) || 0;
    const top  = parseFloat(label.style.top)  || 0;
    const rW = approxLabelWidth(label.textContent);
    placed.push({ left, top, right: left + rW, bottom: top + LABEL_H });
  }
  function approxLabelWidth(text) {
    return Math.max(20, text.length * 10.5 + 10);
  }
  function overlaps(a, b) {
    return a.left < b.right && a.right > b.left &&
           a.top  < b.bottom && a.bottom > b.top;
  }

  // Add labels for newly-wanted words (those without an existing label).
  const newLabels = [];
  for (const w of wanted) {
    if (glossByWord.has(w)) continue;   // already has a label
    const r = w._finalRect;
    const labelW = approxLabelWidth(w._ko);
    const left = Math.round(r.left);
    let top = Math.round(r.bottom + 4);
    const rect = { left, top, right: left + labelW, bottom: top + LABEL_H };
    let tries = 0;
    while (placed.some(p => overlaps(rect, p)) && tries < 10) {
      top += LABEL_H + LABEL_GAP;
      rect.top = top;
      rect.bottom = top + LABEL_H;
      tries++;
    }
    if (top + LABEL_H > window.innerHeight - 4) {
      top = Math.round(r.top - LABEL_H - 4);
      rect.top = top;
      rect.bottom = top + LABEL_H;
      tries = 0;
      while (placed.some(p => overlaps(rect, p)) && tries < 10) {
        top -= LABEL_H + LABEL_GAP;
        rect.top = top;
        rect.bottom = top + LABEL_H;
        tries++;
      }
    }
    placed.push(rect);

    const label = document.createElement("div");
    label.className = "ko-gloss";
    label.textContent = w._ko;
    label.style.left = `${left}px`;
    label.style.top  = `${top}px`;
    const op = glossOpacityFor(w._fillOp ?? 0.06);
    label.style.setProperty("--gloss-op", op.toFixed(2));
    label._targetOpacity = op;
    label._word = w;
    stage.appendChild(label);
    glossByWord.set(w, label);
    glossActive.add(label);
    newLabels.push(label);
  }
  requestAnimationFrame(() => {
    for (const el of newLabels) {
      el.classList.add("in");
      el.style.opacity = el._targetOpacity;
    }
  });
}

function glossOpacityFor(fillOp) {
  // Map caption fillOpacity (0.06 .. 0.32) to label opacity.
  if (fillOp >= 0.30) return 1.0;    // main
  if (fillOp >= 0.10) return 0.55;   // sub
  return 0.25;                         // micro / silent
}

main();
</script>
